services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: chatbot_postgres
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_USER: admin
      POSTGRES_DB: chatbot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d chatbot"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fb_chatbot_backend
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    ports:
      - "3001:3001"
    volumes:
      - ./backend/uploads:/app/uploads
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://chatbot.bbotech.vn/api}
    container_name: chatbot_dashboard
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
