name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - chore/prompt-05r-docs-local-run

jobs:
  backend:
    name: Backend quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # Placeholder only: `prisma validate` resolves env("DATABASE_URL") for schema
      # syntax validation and never connects to a database in CI. Not a secret.
      DATABASE_URL: postgresql://user:password@localhost:5432/db
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run backend quality gate
        run: npm run quality

      - name: Validate Prisma schema
        run: npx prisma validate

  dashboard:
    name: Dashboard typecheck and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
